<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>M4 — Xavfsizlik | DigiComp</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Bricolage+Grotesque:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f3ff;--bg2:#ffffff;--bg3:#f0eeff;
  --surface:#ffffff;--surface2:#f5f3ff;
  --border:#e4e0f8;--border2:#cdc7f0;
  --text:#1a1d3a;--text2:#5a5f8a;--text3:#9699bb;
  --mc:#8b5cf6;--mc2:#a78bfa;
  --mcg:rgba(139,92,246,.1);--mcb:rgba(139,92,246,.25);
  --ok:#10b981;--ok-g:rgba(16,185,129,.1);--ok-b:rgba(16,185,129,.22);
  --warn:#f59e0b;--danger:#ef4444;
  --primary:#6c5ce7;--primary-light:#f0eeff;
  --shadow-sm:0 2px 8px rgba(139,92,246,.08);
  --shadow:0 4px 20px rgba(139,92,246,.12);
  --rad:12px;--rad-lg:18px;--rad-xl:24px;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--mc)}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.au{animation:fadeUp .5s ease both}
.au1{animation:fadeUp .5s .1s ease both}
.au2{animation:fadeUp .5s .2s ease both}

.topnav{position:sticky;top:0;z-index:200;background:rgba(245,243,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;gap:14px;height:58px;box-shadow:0 2px 12px rgba(139,92,246,.06)}
.tn-brand{display:flex;align-items:center;gap:9px;cursor:pointer;text-decoration:none}
.tn-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--mc),var(--mc2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 3px 10px rgba(139,92,246,.3)}
.tn-name{font-family:'Bricolage Grotesque',sans-serif;font-size:15px;font-weight:700;color:var(--text)}
.tn-sep{color:var(--text3);font-size:11px}
.tn-title{font-size:13px;color:var(--text2);font-weight:500}
.tn-prog{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text3)}
.tn-pb{width:90px;height:4px;background:var(--border);border-radius:100px;overflow:hidden}
.tn-pf{height:100%;background:linear-gradient(90deg,var(--mc),var(--mc2));border-radius:100px;transition:width .5s}

.layout{display:flex;min-height:calc(100vh - 58px)}

.sb{width:260px;min-width:260px;background:var(--surface);border-right:1px solid var(--border);padding:18px 12px;position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column;box-shadow:2px 0 12px rgba(139,92,246,.04)}
.sb-head{padding:4px 8px 16px;border-bottom:1px solid var(--border);margin-bottom:14px}
.sb-mod-icon{width:42px;height:42px;border-radius:12px;background:var(--mcg);border:1.5px solid var(--mcb);display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:10px}
.sb-mod-name{font-family:'Bricolage Grotesque',sans-serif;font-size:14px;font-weight:700;color:var(--text);line-height:1.2}
.sb-mod-en{font-size:11px;color:var(--text3);margin-top:2px}
.sb-sec{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.09em;padding:0 8px;margin:14px 0 6px}
.sb-lv-wrap{margin-bottom:10px}
.sb-lv-label{display:flex;align-items:center;gap:6px;padding:4px 8px;margin-bottom:3px}
.lv-dot{width:7px;height:7px;border-radius:50%}
.lv-dot.a1{background:#f59e0b}.lv-dot.a2{background:var(--mc)}.lv-dot.b1{background:var(--ok)}.lv-dot.b2{background:#3b82f6}
.sb-lesson{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:10px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all .2s;border:1.5px solid transparent;margin-bottom:3px}
.sb-lesson:hover:not(.locked){background:var(--mcg);color:var(--mc);border-color:var(--mcb)}
.sb-lesson.active{background:var(--mcg);color:var(--mc);border-color:var(--mcb);font-weight:700}
.sb-lesson.done{color:var(--ok)}
.sb-lesson.locked{opacity:.4;cursor:not-allowed}
.sb-lesson .sl-ic{font-size:14px;width:20px;text-align:center;flex-shrink:0}
.sb-lesson .sl-lbl{flex:1;line-height:1.3}
.sb-lesson .sl-st{margin-left:auto;font-size:11px;font-family:'JetBrains Mono',monospace}
.sb-bottom{margin-top:auto;padding-top:14px;border-top:1px solid var(--border)}
.prog-info{font-size:11px;color:var(--text3);text-align:center;margin-bottom:6px}
.sb-prog-bar{height:5px;background:var(--border);border-radius:100px;overflow:hidden;margin-bottom:12px}
.sb-prog-fill{height:100%;background:linear-gradient(90deg,var(--mc),var(--mc2));border-radius:100px;transition:width .6s}
.btn-cert{width:100%;padding:10px;background:linear-gradient(135deg,var(--mc),var(--mc2));color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 4px 14px rgba(139,92,246,.3)}
.btn-cert:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(139,92,246,.4)}
.btn-cert:disabled{opacity:.35;cursor:not-allowed;background:var(--border2);box-shadow:none}

.main{flex:1;padding:28px 32px;max-width:820px}

.news-panel{width:290px;min-width:290px;background:var(--surface);border-left:1px solid var(--border);padding:18px 14px;position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto;flex-shrink:0}
.np-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.np-live{width:6px;height:6px;border-radius:50%;background:var(--mc);animation:pulse 2s infinite}
.np-filter{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.npf{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--bg3);color:var(--text3);transition:all .2s}
.npf.active{background:var(--mcg);color:var(--mc);border-color:var(--mcb)}
.news-item{padding:11px;background:var(--bg3);border:1.5px solid var(--border);border-radius:11px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.news-item:hover{border-color:var(--mcb);transform:translateY(-1px);box-shadow:var(--shadow-sm)}
.ni-src{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;display:flex;align-items:center;gap:4px}
.ni-src span{padding:1px 6px;border-radius:3px;background:var(--mcg);color:var(--mc);border:1px solid var(--mcb)}
.ni-title{font-size:12px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:4px}
.ni-desc{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:5px}
.ni-date{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.np-refresh{width:100%;padding:8px;background:var(--bg3);border:1.5px solid var(--border2);color:var(--text2);border-radius:9px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;margin-top:8px;transition:all .2s}
.np-refresh:hover{border-color:var(--mcb);color:var(--mc)}

.lh{margin-bottom:22px}
.lh-level{display:inline-flex;align-items:center;gap:6px;margin-bottom:10px}
.lv-badge{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace}
.lv-a1{background:#fff8e1;color:#f59e0b;border:1.5px solid #fde68a}
.lv-a2{background:rgba(139,92,246,.1);color:#8b5cf6;border:1.5px solid rgba(139,92,246,.25)}
.lv-b1{background:rgba(16,185,129,.1);color:#10b981;border:1.5px solid rgba(16,185,129,.25)}
.lv-b2{background:#eff6ff;color:#3b82f6;border:1.5px solid #bfdbfe}
.lh-icon{width:50px;height:50px;border-radius:14px;background:var(--mcg);border:1.5px solid var(--mcb);display:flex;align-items:center;justify-content:center;font-size:23px;margin-bottom:12px}
.lh-title{font-family:'Bricolage Grotesque',sans-serif;font-size:22px;font-weight:800;color:var(--text);line-height:1.2;margin-bottom:5px}
.lh-sub{font-size:14px;color:var(--text2);margin-bottom:10px}
.lh-meta{display:flex;flex-wrap:wrap;gap:8px;font-size:12px}
.lh-chip{display:flex;align-items:center;gap:4px;padding:4px 10px;background:var(--bg3);border:1.5px solid var(--border);border-radius:7px;color:var(--text2);font-weight:500}

.tabs{display:flex;gap:3px;background:var(--bg3);border:1.5px solid var(--border);border-radius:12px;padding:4px;margin-bottom:22px}
.tab{flex:1;padding:9px;text-align:center;font-size:13px;font-weight:600;border-radius:9px;cursor:pointer;color:var(--text3);transition:all .2s}
.tab:hover:not(.active){color:var(--text2);background:rgba(139,92,246,.05)}
.tab.active{background:#fff;color:var(--mc);box-shadow:0 2px 10px rgba(139,92,246,.15);border:1.5px solid var(--mcb)}
.tc{display:none}
.tc.active{display:block;animation:fadeUp .3s ease}

.vcard{background:#fff;border:1.5px solid var(--border);border-radius:var(--rad-xl);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.vthumb{aspect-ratio:16/9;background:linear-gradient(145deg,#0f0020,#2d1060);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden}
.vthumb::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 50% 50% at 50% 50%,rgba(139,92,246,.15),transparent)}
.pbtn{width:66px;height:66px;background:rgba(255,255,255,.15);backdrop-filter:blur(10px);border:2px solid rgba(255,255,255,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;transition:all .25s;position:relative;z-index:1}
.vthumb:hover .pbtn{transform:scale(1.1);background:rgba(139,92,246,.3);border-color:var(--mc)}
.vinfo{padding:16px 20px}
.vt{font-size:14px;font-weight:700;color:var(--text);margin-bottom:5px}
.vd{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:10px}
.vmeta{display:flex;flex-wrap:wrap;gap:7px;font-size:11px}
.vchip{padding:3px 9px;background:var(--bg3);border:1.5px solid var(--border);border-radius:5px;color:var(--text3)}
.vbtn{margin-top:12px;padding:9px 20px;background:var(--mcg);border:1.5px solid var(--mcb);color:var(--mc);border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s}
.vbtn:hover{background:rgba(139,92,246,.18)}
.vbtn.alt{background:var(--bg3);border-color:var(--border2);color:var(--text2)}
.vbtn.alt:hover{border-color:var(--mcb);color:var(--mc)}
.cc-note{margin-top:10px;padding:9px 13px;background:#f5f3ff;border:1.5px solid #ddd6fe;border-radius:9px;font-size:12px;color:#5b21b6}

.lt h4{font-family:'Bricolage Grotesque',sans-serif;font-size:16px;font-weight:700;color:var(--text);margin:20px 0 10px}
.lt h4:first-child{margin-top:0}
.lt p{font-size:14px;color:var(--text2);line-height:1.85;margin-bottom:10px}
.lt .note{background:rgba(139,92,246,.07);border-left:3px solid var(--mc);padding:12px 16px;border-radius:0 10px 10px 0;margin:14px 0;font-size:13px;color:#4c1d95;line-height:1.6}
.lt .note b{color:var(--mc);display:block;margin-bottom:3px}
.lt .warn{background:#fffbeb;border-left:3px solid #f59e0b;padding:12px 16px;border-radius:0 10px 10px 0;margin:14px 0;font-size:13px;color:#78350f;line-height:1.6}
.lt .warn b{color:#d97706;display:block;margin-bottom:3px}
.lt .code{background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:13px 16px;font-family:'JetBrains Mono',monospace;font-size:12px;margin:13px 0;color:var(--text2);line-height:1.8;white-space:pre-wrap}
.term{background:rgba(139,92,246,.1);color:#7c3aed;padding:1px 7px;border-radius:5px;font-weight:600;font-size:13px;border:1px solid rgba(139,92,246,.2)}
.tg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:13px 0}
.ti{padding:12px 14px;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px}
.ti-n{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.ti-d{font-size:12px;color:var(--text3);line-height:1.5}
.ti-t{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;margin-top:5px}
.tdanger{background:rgba(239,68,68,.1);color:#dc2626}
.tok{background:rgba(16,185,129,.1);color:#059669}
.twarn{background:rgba(245,158,11,.1);color:#d97706}

.task-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--rad-lg);padding:18px;margin-bottom:14px;box-shadow:var(--shadow-sm)}
.task-head{display:flex;align-items:flex-start;gap:11px;margin-bottom:11px}
.tnum{width:28px;height:28px;border-radius:7px;background:var(--mcg);border:1.5px solid var(--mcb);color:var(--mc);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'JetBrains Mono',monospace}
.ttitle{font-size:14px;font-weight:700;color:var(--text)}
.tdesc{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:12px}
.tsteps{background:var(--bg3);border:1.5px solid var(--border);border-radius:9px;padding:12px 15px;margin-bottom:12px}
.tsteps p{font-size:12px;color:var(--text3);margin-bottom:5px;padding-left:14px;position:relative;line-height:1.5}
.tsteps p:last-child{margin-bottom:0}
.tsteps p::before{content:'→';position:absolute;left:0;color:var(--mc);font-weight:700}
textarea{width:100%;padding:11px 14px;background:var(--bg3);border:1.5px solid var(--border);border-radius:9px;font-size:13px;color:var(--text);resize:vertical;min-height:90px;outline:none;transition:all .2s;line-height:1.6;font-family:'Plus Jakarta Sans',sans-serif}
textarea:focus{border-color:var(--mc);background:#fff;box-shadow:0 0 0 3px rgba(139,92,246,.1)}
textarea::placeholder{color:var(--text3)}
.tbtn{margin-top:9px;padding:8px 18px;background:var(--mcg);border:1.5px solid var(--mcb);color:var(--mc);border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s}
.tbtn:hover{background:rgba(139,92,246,.18)}
.tfb{margin-top:8px;padding:9px 13px;border-radius:8px;font-size:12px;display:none;line-height:1.5}
.fbok{background:rgba(16,185,129,.08);color:#059669;border:1.5px solid var(--ok-b)}
.fberr{background:rgba(239,68,68,.06);color:#ef4444;border:1.5px solid rgba(239,68,68,.2)}

.qq{background:#fff;border:1.5px solid var(--border);border-radius:var(--rad-lg);padding:18px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
.qnum{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;font-family:'JetBrains Mono',monospace}
.qtext{font-size:14px;font-weight:600;color:var(--text);line-height:1.6;margin-bottom:14px}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:center;gap:10px;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .2s;background:#fff}
.opt:hover{border-color:var(--mcb);background:var(--mcg);color:var(--mc)}
.opt.sel{border-color:var(--mcb);background:var(--mcg);color:var(--mc);font-weight:600}
.opt.ok{border-color:var(--ok-b);background:var(--ok-g);color:var(--ok)}
.opt.bad{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.06);color:#ef4444}
.optk{width:24px;height:24px;border-radius:6px;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:'JetBrains Mono',monospace}
.qres{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--rad-lg);padding:24px;text-align:center;margin-bottom:14px;display:none}
.qrs{font-family:'JetBrains Mono',monospace;font-size:54px;font-weight:500;line-height:1}
.qrl{font-size:12px;color:var(--text3);margin-top:4px;font-family:'JetBrains Mono',monospace}
.qrm{font-size:14px;color:var(--text2);margin-top:10px;line-height:1.6}
.qfail{background:#fffbeb;border:1.5px solid #fde68a;border-radius:10px;padding:13px;text-align:center;margin-bottom:14px;display:none;font-size:13px;color:#78350f;line-height:1.6}
.btn-submit{width:100%;padding:13px;background:linear-gradient(135deg,var(--mc),var(--mc2));color:#fff;border:none;border-radius:var(--rad);font-size:14px;font-weight:700;cursor:pointer;transition:all .25s;font-family:'Plus Jakarta Sans',sans-serif;box-shadow:0 4px 14px rgba(139,92,246,.3)}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(139,92,246,.4)}
.btn-next{width:100%;padding:12px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none;border-radius:var(--rad);font-size:14px;font-weight:700;cursor:pointer;transition:all .25s;margin-top:10px;display:none;font-family:'Plus Jakarta Sans',sans-serif;box-shadow:0 4px 14px rgba(16,185,129,.3)}
.btn-retry{width:100%;padding:11px;background:#fffbeb;border:1.5px solid #fde68a;color:#78350f;border-radius:var(--rad);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:10px;display:none;font-family:'Plus Jakarta Sans',sans-serif}

.navbtns{display:flex;justify-content:space-between;margin-top:24px;padding-top:18px;border-top:1.5px solid var(--border)}
.navbtn{display:flex;align-items:center;gap:6px;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;border:1.5px solid var(--border);background:#fff;color:var(--text2);font-family:'Plus Jakarta Sans',sans-serif}
.navbtn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.navbtn.pri{background:var(--mcg);border-color:var(--mcb);color:var(--mc)}
.navbtn.pri:hover{background:rgba(139,92,246,.18)}

.toast{position:fixed;bottom:22px;right:22px;background:var(--mc);color:#fff;padding:11px 18px;border-radius:11px;font-size:13px;font-weight:600;z-index:9999;transform:translateY(70px);transition:transform .35s cubic-bezier(.34,1.56,.64,1);box-shadow:0 6px 24px rgba(139,92,246,.4)}
.toast.show{transform:translateY(0)}

/* Cert overlay fix */
#certOverlay{position:fixed !important;inset:0 !important;z-index:9000 !important;background:rgba(0,0,0,0.85) !important;display:none !important;align-items:center !important;justify-content:center !important;}
#certOverlay.show{display:flex !important;}

/* AI */
@keyframes ai-pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.6)}70%{box-shadow:0 0 0 14px rgba(239,68,68,.0)}}
@keyframes ai-bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes ai-fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.ai-wrap{position:fixed;bottom:28px;right:28px;z-index:9999;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.ai-tip{background:#1a1d3a;color:#fff;font-size:12px;font-weight:600;padding:7px 13px;border-radius:10px;white-space:nowrap;position:relative}
.ai-tip::after{content:'';position:absolute;bottom:-5px;right:20px;border:5px solid transparent;border-top-color:#1a1d3a}
.ai-btn{width:56px;height:56px;background:linear-gradient(135deg,#ef4444,#dc2626);border-radius:50%;border:none;cursor:pointer;font-size:26px;animation:ai-pulse 2s infinite,ai-bounce 3s ease-in-out infinite;position:relative;display:flex;align-items:center;justify-content:center}
.ai-btn.on{background:linear-gradient(135deg,var(--mc),var(--mc2));animation:none}
.ai-badge{position:absolute;top:-1px;right:-1px;width:18px;height:18px;background:#fff;border-radius:50%;border:2px solid #ef4444;font-size:10px;font-weight:800;color:#ef4444;display:flex;align-items:center;justify-content:center}

let userLevel = parseInt(localStorage.getItem('m4_entry_level') || '0');
let quizScores = JSON.parse(localStorage.getItem('m4_quiz_scores') || '{}');
let completedLessons = JSON.parse(localStorage.getItem('m4_completed') || '[]');
let currentLesson = userLevel;
let quizAns = [], quizDone = false;
let userName = 'Talaba';
let allNews = [], currentFilter = 'all';

const mainUser = localStorage.getItem('dc2_cur') ? JSON.parse(localStorage.getItem('dc2_cur')) : null;
if(mainUser && mainUser.levels && mainUser.levels.m4) {
  const lm = {A1:0,A2:1,B1:2,B2:3};
  userLevel = lm[mainUser.levels.m4] || 0;
  userName = mainUser.name || 'Talaba';
  localStorage.setItem('m4_entry_level', userLevel);
}

function isUnlocked(idx) {
  if(idx <= userLevel) return true;
  return quizScores[idx-1] !== undefined && quizScores[idx-1] >= 70;
}

function renderSidebar() {
  const lvCls = ['a1','a2','b1','b2'];
  const lvNames = ["Boshlang'ich",'Asosiy',"O'rta",'Mustaqil'];
  let html = '';
  LESSONS.forEach((L,i) => {
    const locked = i > userLevel && !isUnlocked(i);
    const done = completedLessons.includes(i);
    const active = i === currentLesson;
    const qs = quizScores[i];
    const st = locked ? '🔒' : done ? '✅' : active ? '📖' : '○';
    html += `<div class="sb-lv-wrap">
      <div class="sb-lv-label">
        <span class="lv-dot ${lvCls[i]}"></span>
        <span style="font-size:11px;color:var(--text2);font-weight:600">${LEVELS[i]} — ${lvNames[i]}</span>
      </div>
      <div class="sb-lesson${active?' active':''}${done?' done':''}${locked?' locked':''}"
           onclick="${locked ? 'lockedMsg('+i+')' : 'showLesson('+i+')'}">
        <span class="sl-ic">${L.icon}</span>
        <span class="sl-lbl">${L.title}</span>
        <span class="sl-st">${st}${qs !== undefined ? ' '+qs+'%' : ''}</span>
      </div>
    </div>`;
  });
  document.getElementById('sbLessons').innerHTML = html;
  const d = completedLessons.length;
  document.getElementById('sbProgTxt').textContent = d + '/4 dars yakunlandi';
  document.getElementById('sbProgBar').style.width = (d*25) + '%';
  document.getElementById('certBtn').disabled = d < 4;
  document.getElementById('navPtxt').textContent = d + '/4';
  document.getElementById('navPbar').style.width = (d*25) + '%';
}

function lockedMsg(i) { showToast('🔒 Avval ' + LESSONS[i-1].level + ' quizini 70%+ bilan o\'ting'); }

function showLesson(idx){
  if(idx>userLevel&&!isUnlocked(idx)){lockedClick(idx);return;}
  currentLesson=idx;quizAns=[];quizDone=false;
  renderSidebar();
  const L=LESSONS[idx];
  const lb=['lv-a1','lv-a2','lv-b1','lv-b2'][idx];
  document.getElementById('mainContent').innerHTML=`
    <div class="lh au">
      <div class="lh-level"><span class="lv-badge ${lb}">${L.level}</span>
      <span style="font-size:12px;color:var(--text3)">daraja</span></div>
      <div class="lh-icon">${L.icon}</div>
      <div class="lh-title">${L.title}</div>
      <div class="lh-sub">${L.subtitle}</div>
      <div class="lh-meta">
        <span class="lh-chip">⏱ ${L.dur}</span>
        <span class="lh-chip">🛠 ${L.taskCount} amaliy</span>
        <span class="lh-chip">❓ ${L.quizCount} quiz</span>
        ${completedLessons.includes(idx)?'<span class="lh-chip" style="color:var(--ok);border-color:var(--ok-b)">✅ Yakunlangan</span>':''}

      </div>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="stab(this,'video')">🎬 Video</div>
      <div class="tab" onclick="stab(this,'matn')">📄 Matn</div>
      <div class="tab" onclick="stab(this,'amaliy')">🛠 Amaliy</div>

    <div id="tc-video" class="tc active">${renderVideo(L)}</div>

  window.scrollTo({top:0,behavior:'smooth'});

function chkTask(li,ti){
  const v=document.getElementById('ta_'+li+'_'+ti)?.value.trim();
  const fb=document.getElementById('tfb_'+li+'_'+ti);
  if(!v||v.length<15){fb.className='tfb fberr';fb.textContent='⚠️ Kamida 15 belgi yozing';fb.style.display='block';return;}
  fb.className='tfb fbok';fb.textContent='✅ Bajarildi! Quizga o\'ting.';fb.style.display='block';
  const _cu2=localStorage.getItem('dc2_cur')?JSON.parse(localStorage.getItem('dc2_cur')):null;
  const _L=LESSONS[li];const _dar=LEVELS[li];
  syncAmaliy(_cu2,'{mod_name}',_dar,ti+1,_L.tasks[ti].title,v);
}

function qsel(li,qi,oi){
  if(quizDone)return;
  quizAns[qi]=oi;
  document.querySelectorAll(`[id^="opt_${li}_${qi}_"]`).forEach((el,i)=>el.classList.toggle('sel',i===oi));
}

function submitQuiz(idx){
  const L=LESSONS[idx]; quizDone=true;
  let correct=0;
  L.quiz.forEach((q,qi)=>{
    const ua=quizAns[qi];
    q.o.forEach((_,oi)=>{
      const el=document.getElementById(`opt_${idx}_${qi}_${oi}`);
      if(!el)return;
      el.style.pointerEvents='none';
      if(oi===q.a)el.classList.add('ok');
      else if(oi===ua&&ua!==q.a)el.classList.add('bad');
    });
    if(ua===q.a)correct++;
  });
  const score=Math.round(correct/L.quiz.length*100);
  quizScores[idx]=score;
  localStorage.setItem('m4_quiz_scores',JSON.stringify(quizScores));
  const _cu=localStorage.getItem('dc2_cur')?JSON.parse(localStorage.getItem('dc2_cur')):null;
  const _lv=LEVELS[idx];
  syncNatija(_cu,'M4',_lv,score,correct,L.quiz.length,1);
  if(score>=70&&!completedLessons.includes(idx)){
    completedLessons.push(idx);
    localStorage.setItem('m4_completed',JSON.stringify(completedLessons));
  }
  const res=document.getElementById('qres_'+idx);
  if(res){res.style.display='block';res.innerHTML=`<div class="qrs" style="color:${score>=70?'var(--ok)':'var(--warn)'}">${score}%</div><div class="qrl">${correct}/${L.quiz.length} to'g'ri</div><div class="qrm">${score>=70?'✅ O\'tdingiz! '+(idx<3?'Keyingi daraja ochildi 🔓':'Modul yakunlandi 🎓'):'⚠️ 70% kerak.'}</div>`;}
  document.getElementById('bsub_'+idx).style.display='none';
  if(score>=70){const nb=document.getElementById('bnxt_'+idx);if(nb)nb.style.display='block';showToast(score>=90?'🌟 Ajoyib! '+score+'%':'✅ O\'tdingiz! '+score+'%');}
  else{const rb=document.getElementById('bret_'+idx);if(rb)rb.style.display='block';const f=document.getElementById('qfail_'+idx);if(f)f.style.display='block';showToast('⚠️ '+score+'% — 70% kerak!');}
  renderSidebar();
}

function retryQuiz(idx){
  delete quizScores[idx];
  localStorage.setItem('m4_quiz_scores',JSON.stringify(quizScores));
  completedLessons=completedLessons.filter(i=>i!==idx);
  localStorage.setItem('m4_completed',JSON.stringify(completedLessons));
  quizDone=false;quizAns=[];
  document.getElementById('tc-quiz').innerHTML=renderQuiz(LESSONS[idx],idx);
  stabName('quiz');renderSidebar();
  showToast('🔄 Quiz yangilandi!');
}

async function loadNews(){
  let loaded=[];
  try{
    const r=await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://feeds.feedburner.com/TheHackersNews&count=5',{signal:AbortSignal.timeout(4000)});
    if(r.ok){const d=await r.json();if(d.status==='ok'&&d.items?.length){
      loaded=d.items.slice(0,5).map(i=>({title:(i.title||'').substring(0,80),desc:(i.description||'').replace(/<[^>]+>/g,'').substring(0,100)+'...',source:'The Hacker News',tag:'security',date:i.pubDate?new Date(i.pubDate).toLocaleDateString('uz-UZ'):'2024',url:i.link||'#'}));
    }}
  }catch(e){}
  if(!loaded.length)loaded=[...STATIC_NEWS];
  allNews=loaded.sort(()=>Math.random()-.5);
  renderNews();
}
function renderNews(){
  const c=document.getElementById('newsContainer');
  const f=currentFilter==='all'?allNews:allNews.filter(n=>n.tag===currentFilter);
  if(!f.length){c.innerHTML='<div style="text-align:center;padding:20px;color:var(--text3)">Bu bo\'limda yangilik yo\'q</div>';return;}
  c.innerHTML=f.map(n=>`<div class="news-item" onclick="window.open('${n.url}','_blank')">
    <div class="ni-src"><span>${n.tag.toUpperCase()}</span>${n.source}</div>
    <div class="ni-title">${n.title}</div>
    <div class="ni-desc">${n.desc}</div>
    <div class="ni-date">📅 ${n.date}</div>
  </div>`).join('');
}

  };

  window.aiSend=function(){
    var inp=document.getElementById('aiInp');
    var msg=(inp.value||'').trim();if(!msg)return;
    inp.value='';addMsg(msg,'u');
    var lid='lid'+Date.now();addMsg('⟳ Javob...','b ld',lid);
    var ch=history.map(function(h){return {role:h.role,message:h.message};}); 
    fetch('https://api.cohere.com/v1/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+KEY},
      body:JSON.stringify({model:'command-r-08-2024',message:msg,preamble:'Sen DigiComp M4 AI yordamchisisаn. Mavzu: Xavfsizlik va maxfiylik. Uzbek tilida qisqa javob ber.',chat_history:ch})
    }).then(function(r){return r.json();})
    .then(function(d){
      var el=document.getElementById(lid);if(el)el.remove();
      if(d.text){addMsg(d.text,'b');history.push({role:'USER',message:msg});history.push({role:'CHATBOT',message:d.text});if(history.length>16)history=history.slice(-16);}
      else addMsg('Xatolik: '+(d.message||'nomalum'),'b');
    }).catch(function(e){var el=document.getElementById(lid);if(el)el.remove();addMsg('Xatolik: '+e.message,'b');});
  };

  window.aiFeedback=function(li,ti){
    var L=LESSONS[li];var task=L.tasks[ti];
    var inp=document.getElementById('ta_'+li+'_'+ti);
    var val=inp?(inp.value||'').trim():'';
    if(val.length<10){showToast('Avval javobingizni yozing!');return;}
    var btn=document.getElementById('aifb_'+li+'_'+ti);
    var res=document.getElementById('aifbr_'+li+'_'+ti);
    btn.disabled=true;btn.textContent='⟳ Baholanmoqda...';
    res.style.display='block';res.textContent='🤖 AI baholamoqda...';
    fetch('https://api.cohere.com/v1/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+KEY},
      body:JSON.stringify({model:'command-r-08-2024',message:'Topshiriq: '+task.title+'. Talaba javobi: '+val+'. Baho: A/B/C/D va izoh.',preamble:'Sen ta\'lim AI baholovchisisаn. Uzbek tilida qisqa baho ber.'})
    }).then(function(r){return r.json();})
    .then(function(d){
      if(d.text)res.innerHTML='<b style="color:var(--mc)">🤖 AI Baholash:</b><br>'+d.text;
      else res.textContent='Xatolik.';
      btn.disabled=false;btn.textContent='🤖 AI baholash';
    }).catch(function(e){res.textContent='Xatolik: '+e.message;btn.disabled=false;btn.textContent='🤖 AI baholash';});
  };

  window.aiGenQuiz=function(idx){
    var L=LESSONS[idx];
    var btn=document.getElementById('aiqb_'+idx);
    var res=document.getElementById('aiqr_'+idx);
    btn.disabled=true;btn.textContent='⟳ Yaratilmoqda...';
    res.style.display='block';res.textContent='🤖 Savollar yaratilmoqda...';
    fetch('https://api.cohere.com/v1/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+KEY},
      body:JSON.stringify({model:'command-r-08-2024',message:L.title+' mavzusida 4 ta test savol. JSON: [{"q":"?","o":["A","B","C","D"],"a":0}]',preamble:'Faqat JSON qaytarasan, boshqa matn yozma.'})
    }).then(function(r){return r.json();})
    .then(function(d){
      if(d.text){
        try{
          var raw=d.text.replace(/```json|```|`/g,'').trim();
          var m=raw.match(/\[.*\]/s);if(m)raw=m[0];
          var qs=JSON.parse(raw);
          res.innerHTML=qs.map(function(q,i){
            return '<div style="background:#fff;border:1px solid #e0d8ff;border-radius:9px;padding:11px;margin-bottom:8px">'+
              '<div style="font-size:12px;font-weight:700;color:#333;margin-bottom:7px">'+(i+1)+'. '+q.q+'</div>'+
              q.o.map(function(o,j){var ok=j===q.a;return '<div style="font-size:11px;padding:4px 9px;border-radius:6px;margin-bottom:3px;background:'+(ok?'#dcfce7':'#f5f5f5')+';color:'+(ok?'#16a34a':'#555')+';font-weight:'+(ok?'700':'400')+'">'+'ABCD'[j]+'. '+o+(ok?' ✓':'')+'</div>';}).join('')+'</div>';
          }).join('');
        }catch(e){res.textContent=d.text;}
      }else res.textContent='Xatolik.';
      btn.disabled=false;btn.textContent='✨ Yangi savollar';
    }).catch(function(e){res.textContent='Xatolik: '+e.message;btn.disabled=false;btn.textContent='✨ AI savollar';});
  };

  function addMsg(t,cls,id){
    var box=document.getElementById('aiMsgs');if(!box)return;
    var el=document.createElement('div');el.className='ai-msg '+cls;el.textContent=t;
    if(id)el.id=id;box.appendChild(el);box.scrollTop=box.scrollHeight;
  }
})();
</script>
</html>
